name: Agent improvement
description: Propose or claim an improvement to an image agent
labels: ["agent-improvement"]
body:
  - type: markdown
    attributes:
      value: |
        Use this issue for agent behavior, architecture, generation quality,
        or tool-use improvements. See
        [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md).
  - type: input
    id: area
    attributes:
      label: Capability or area
      description: Which capability or component does this target?
      placeholder: plan | reason | search | memory | feedback | judge | agent
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What is missing or underperforming today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: What should change, and roughly which files are involved?
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Expected agent impact
      description: What user-visible or architectural improvement should this produce?
    validations:
      required: false
