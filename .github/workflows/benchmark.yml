name: Round Benchmark

on:
  schedule:
    - cron: "0 0,12 * * *"
  workflow_dispatch:
    inputs:
      round_id:
        description: Optional round id override
        required: false
        type: string

env:
  IMAGENT_BENCH_REPOSITORY: imagent-ai/imagent-bench
  IMAGENT_BENCH_REF: 8b68e238a6b19184138e66b2054e4f338a62b062
  IMAGENT_ROUND_THRESHOLD: ${{ vars.IMAGENT_ROUND_THRESHOLD || '0' }}
  IMAGENT_BASELINE_SCORE: ${{ vars.IMAGENT_BASELINE_SCORE || '0' }}
  IMAGENT_BASELINE_COMMIT: ${{ vars.IMAGENT_BASELINE_COMMIT }}
  IMAGENT_ROUND_ID: ${{ inputs.round_id }}

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: imagent-round-benchmark
  cancel-in-progress: false

jobs:
  round-benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Checkout pinned imagent-bench
        uses: actions/checkout@v4
        with:
          repository: ${{ env.IMAGENT_BENCH_REPOSITORY }}
          ref: ${{ env.IMAGENT_BENCH_REF }}
          path: _imagent-bench

      - name: Install benchmark runner
        run: |
          python -m pip install -U pip
          python -m pip install -e ./_imagent-bench

      - name: Run round manager
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python .github/scripts/round_manager.py

      - name: Upload round artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: imagent-round-output
          path: round-output
          if-no-files-found: ignore
