name: Benchmark

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  official-benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout candidate
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Checkout imagent-bench
        uses: actions/checkout@v4
        with:
          repository: imagent-ai/imagent-bench
          path: _imagent-bench

      - name: Install imagent-bench
        run: |
          python -m pip install -U pip
          python -m pip install -e ./_imagent-bench

      - name: Run official benchmark
        env:
          BENCHMARK_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          imagent-bench run \
            --repository . \
            --commit "$BENCHMARK_COMMIT" \
            --config _imagent-bench/configs/official.json \
            --output-dir benchmark-output

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: imagent-benchmark-report
          path: benchmark-output
          if-no-files-found: error

      - name: Add benchmark summary
        if: always() && hashFiles('benchmark-output/benchmark-summary.md') != ''
        run: cat benchmark-output/benchmark-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment and label pull request
        if: >-
          always() &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          hashFiles('benchmark-output/benchmark-report.json') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('benchmark-output/benchmark-report.json', 'utf8'));
            const summary = fs.readFileSync('benchmark-output/benchmark-summary.md', 'utf8');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const labels = {
              'benchmark-pass': '2da44e',
              'benchmark-fail': 'd73a4a',
              'benchmark-running': 'fbca04'
            };
            for (const [name, color] of Object.entries(labels)) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({ owner, repo, name, color });
                } else {
                  throw error;
                }
              }
            }
            for (const name of Object.keys(labels)) {
              try {
                await github.rest.issues.removeLabel({ owner, repo, issue_number, name });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            }
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number,
              labels: [report.status === 'pass' ? 'benchmark-pass' : 'benchmark-fail']
            });
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: summary
            });

      - name: Enforce benchmark policy
        if: always()
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          report_path = Path("benchmark-output/benchmark-report.json")
          if not report_path.exists():
              print("benchmark report was not created", file=sys.stderr)
              sys.exit(1)
          report = json.loads(report_path.read_text(encoding="utf-8"))
          if report.get("status") != "pass":
              for reason in report.get("policy", {}).get("reasons", []):
                  print(reason, file=sys.stderr)
              sys.exit(1)
          PY
