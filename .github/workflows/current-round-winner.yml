name: Maintain Current Round Winner

on:
  pull_request_target:
    types: [labeled]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  promote-current-winner:
    if: github.event.label.name == 'round-winner'
    runs-on: ubuntu-latest
    concurrency:
      group: current-round-winner
      cancel-in-progress: false

    steps:
      - name: Keep one reward-eligible round winner
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const winnerNumber = context.payload.pull_request.number;
            const pastWinnerLabel = 'past-round-winner';
            const activeRewardLabel = 'round-winner';

            async function ensureLabel(name, color) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
                await github.rest.issues.createLabel({ owner, repo, name, color });
              }
            }

            async function removeLabel(issueNumber, name) {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  name
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
            }

            await ensureLabel(pastWinnerLabel, '6e7781');

            const { data: winner } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: winnerNumber
            });
            if (!winner.merged) {
              await removeLabel(winnerNumber, 'round-winner');
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: winnerNumber,
                body: 'The `round-winner` label is reserved for a merged PR. Merge the selected PR, then add the label again.'
              });
              return;
            }

            const winnerLabels = await github.paginate(github.rest.issues.listLabelsOnIssue, {
              owner,
              repo,
              issue_number: winnerNumber,
              per_page: 100
            });
            if (!winnerLabels.some((label) => label.name === 'round-winner')) {
              core.info(`PR #${winnerNumber} is no longer the active winner; skipping demotion.`);
              return;
            }
            await removeLabel(winnerNumber, pastWinnerLabel);

            const activeWinners = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'all',
              labels: 'round-winner',
              per_page: 100
            });

            for (const previous of activeWinners) {
              if (!previous.pull_request || previous.number === winnerNumber) {
                continue;
              }

              await removeLabel(previous.number, activeRewardLabel);
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: previous.number,
                labels: [pastWinnerLabel]
              });
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: previous.number,
                body: `A newer round winner was selected in #${winnerNumber}. This PR remains in the winner history, but its active reward label was removed and it no longer earns current competition score.`
              });
            }
