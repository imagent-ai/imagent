name: PR Rules

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Validate Leaderboard UI contributor rules
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;
            const pr = context.payload.pull_request;
            const labels = {
              leaderboard: { name: 'leaderboard-ui', color: '0969da' },
              leaderboardPass: { name: 'leaderboard-ui-pass', color: '2da44e' },
              needsEvidence: { name: 'needs-evidence', color: 'fbca04' },
              invalid: { name: 'invalid-pr', color: 'd73a4a' },
              duplicate: { name: 'duplicate-pr', color: 'd73a4a' }
            };
            const legacyLabels = [
              'agent-improvement',
              'pr-rules-pass',
              'generation-ui',
              'generation-ui-pass',
              'needs-rebase',
              'benchmark-fail',
              'benchmark-pass',
              'benchmark-passed',
              'benchmark-regression',
              'benchmark-running',
              'round-benchmark-running',
              'round-eligible',
              'round-winner',
              'below-threshold'
            ];
            const evidenceCommentMarker = '<!-- imagent:needs-leaderboard-evidence -->';
            const requiredSections = [
              '## Summary',
              '## Motivation',
              '## Changes',
              '## Testing'
            ];
            const leaderboardAllowedFiles = new Set([
              'imagent-ui/app/leaderboard/page.tsx',
              'imagent-ui/app/components/LeaderboardBoard.tsx',
              'imagent-ui/app/styles.css'
            ]);

            for (const label of Object.values(labels)) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label.name });
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name: label.name,
                    color: label.color
                  });
                } else {
                  throw error;
                }
              }
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
              per_page: 100
            });
            const filenames = files.map((file) => file.filename);
            const body = pr.body || '';
            const trustedAuthorAssociations = new Set(['OWNER', 'MEMBER', 'COLLABORATOR']);
            const isMaintainerPr = pr.user.login === owner || trustedAuthorAssociations.has(pr.author_association);
            const titlePattern = /^(feat|fix|refactor|docs|test|perf|chore|ci|build|style): .+/;

            function isAllowedLeaderboardFile(filename) {
              if (leaderboardAllowedFiles.has(filename)) {
                return true;
              }
              return /^imagent-ui\/app\/leaderboard\/(?:[A-Za-z0-9][A-Za-z0-9._-]*\/)*[A-Za-z0-9][A-Za-z0-9._-]*\.(?:tsx|css)$/.test(filename);
            }

            function checkedBox(text, label) {
              const normalizedLabel = label.replace(/\s+/g, '\\s+');
              return new RegExp('(^|\\n)\\s*-\\s*\\[[xX]\\]\\s*' + normalizedLabel + '\\b').test(text);
            }

            function hasVisualEvidence(text) {
              return /!\[[^\]]*\]\([^)]+\)|https?:\/\/\S*(github\.com\/user-attachments\/assets\/|githubusercontent\.com\/|\.png|\.jpe?g|\.gif|\.webp|\.mp4|\.mov|\.webm|loom\.com\/share\/|youtube\.com\/watch|youtu\.be\/)/i.test(text);
            }

            function classifyContribution(text) {
              if (!checkedBox(text, 'Leaderboard UI')) {
                return {
                  mode: 'invalid',
                  reason: 'The active competition accepts only Leaderboard UI submissions. Select Leaderboard UI in the PR template.'
                };
              }
              return { mode: 'leaderboard-ui', reason: '' };
            }

            function isLeaderboardSubmission(text, changedFiles) {
              return checkedBox(text, 'Leaderboard UI')
                && changedFiles.length > 0
                && changedFiles.every(isAllowedLeaderboardFile);
            }

            async function removeLabel(name) {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: pull_number,
                  name
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
            }

            async function removeLabels(names) {
              for (const name of names) {
                await removeLabel(name);
              }
            }

            async function findBotComment(marker) {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: pull_number,
                per_page: 100
              });
              return comments.find((comment) => (
                comment.user?.type === 'Bot'
                && typeof comment.body === 'string'
                && comment.body.includes(marker)
              ));
            }

            async function upsertBotComment(marker, commentBody) {
              const existing = await findBotComment(marker);
              const fullBody = marker + '\n' + commentBody;
              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body: fullBody
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: pull_number,
                  body: fullBody
                });
              }
            }

            async function updateBotCommentIfPresent(marker, commentBody) {
              const existing = await findBotComment(marker);
              if (!existing) {
                return;
              }
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: marker + '\n' + commentBody
              });
            }

            async function olderLeaderboardDuplicate() {
              const openPulls = await github.paginate(github.rest.pulls.list, {
                owner,
                repo,
                state: 'open',
                per_page: 100
              });
              const currentCreatedAt = new Date(pr.created_at).getTime();
              const candidates = openPulls
                .filter((item) => item.number !== pull_number)
                .filter((item) => item.user.login === pr.user.login)
                .filter((item) => {
                  const createdAt = new Date(item.created_at).getTime();
                  return createdAt < currentCreatedAt || (createdAt === currentCreatedAt && item.number < pull_number);
                })
                .sort((left, right) => new Date(left.created_at) - new Date(right.created_at));

              for (const item of candidates) {
                const otherFiles = await github.paginate(github.rest.pulls.listFiles, {
                  owner,
                  repo,
                  pull_number: item.number,
                  per_page: 100
                });
                if (isLeaderboardSubmission(item.body || '', otherFiles.map((file) => file.filename))) {
                  return item;
                }
              }
              return null;
            }

            const managedLabels = [
              labels.leaderboard.name,
              labels.leaderboardPass.name,
              labels.needsEvidence.name,
              labels.invalid.name,
              labels.duplicate.name,
              ...legacyLabels
            ];

            if (isMaintainerPr) {
              await removeLabels(managedLabels);
              return;
            }

            const classification = classifyContribution(body);
            const failures = [];

            if (!titlePattern.test(pr.title || '')) {
              failures.push('PR title must use a conventional prefix, for example style: refine leaderboard filters.');
            }
            if (classification.mode === 'invalid') {
              failures.push(classification.reason);
            }

            if (classification.mode === 'leaderboard-ui') {
              for (const section of requiredSections) {
                if (!body.includes(section)) {
                  failures.push('Leaderboard UI PR body must include ' + section + '.');
                }
              }
              if (!filenames.length) {
                failures.push('Leaderboard UI PR must change at least one approved Leaderboard UI file.');
              }
              const extraFiles = filenames.filter((name) => !isAllowedLeaderboardFile(name));
              if (extraFiles.length) {
                failures.push(
                  'Leaderboard UI PRs may only touch the approved leaderboard UI surface; remove: '
                  + extraFiles.map((name) => '"' + name + '"').join(', ')
                );
              }
              if (!failures.length) {
                const olderDuplicate = await olderLeaderboardDuplicate();
                if (olderDuplicate) {
                  failures.push(
                    'Only one open Leaderboard UI PR per contributor is allowed. Update #'
                    + olderDuplicate.number
                    + ' instead.'
                  );
                }
              }
            }

            if (failures.length) {
              await removeLabels(managedLabels);
              const labelsToAdd = [labels.invalid.name];
              if (classification.mode === 'leaderboard-ui') {
                labelsToAdd.push(labels.leaderboard.name);
              }
              if (failures.some((failure) => failure.startsWith('Only one open '))) {
                labelsToAdd.push(labels.duplicate.name);
              }
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: pull_number,
                labels: labelsToAdd
              });
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pull_number,
                body: [
                  'This PR was closed because the active competition accepts only scoped Leaderboard UI submissions.',
                  '',
                  ...failures.map((failure) => '- ' + failure),
                  '',
                  'Update the PR title, description, and files, then reopen the PR.'
                ].join('\n')
              });
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number,
                state: 'closed'
              });
              return;
            }

            await removeLabels([
              labels.invalid.name,
              labels.duplicate.name,
              labels.needsEvidence.name,
              ...legacyLabels
            ]);
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: pull_number,
              labels: [labels.leaderboard.name, labels.leaderboardPass.name]
            });

            if (hasVisualEvidence(body)) {
              await updateBotCommentIfPresent(
                evidenceCommentMarker,
                [
                  'Visual evidence detected for this Leaderboard UI PR.',
                  '',
                  'needs-evidence was removed. This PR is ready for manual UI review once CI passes.'
                ].join('\n')
              );
              return;
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: pull_number,
              labels: [labels.needsEvidence.name]
            });
            await upsertBotComment(
              evidenceCommentMarker,
              [
                'This Leaderboard UI PR is still open, but it needs visual evidence before manual review.',
                '',
                'Please edit the PR description and add at least one screenshot or video link showing the updated Leaderboard page.',
                'Accepted evidence includes GitHub image or video uploads, direct image or video links, Loom, or YouTube links.'
              ].join('\n')
            );
