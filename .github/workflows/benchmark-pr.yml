name: Benchmark PR

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: benchmark-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout base
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base
          persist-credentials: false

      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: head
          persist-credentials: false

      - name: Detect agent changes
        id: changes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p results
          gh api \
            repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files \
            --paginate \
            --jq '.[].filename' > results/changed-files.txt
          if grep -q '^agents/openrouter_baseline/' results/changed-files.txt; then
            echo "enforce_improvement=true" >> "$GITHUB_OUTPUT"
          else
            echo "enforce_improvement=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install benchmark from base
        working-directory: base
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Validate gate config
        working-directory: base
        run: python -m imagent_bench.config validate configs/pr-gate.yaml

      - name: Run benchmark tests
        working-directory: base
        run: python -m pytest

      - name: Run baseline from base
        working-directory: base
        run: |
          python -m imagent_bench.runner \
            --config configs/pr-gate.yaml \
            --agent agents/openrouter_baseline \
            --output ../results/base

      - name: Run candidate from PR
        working-directory: base
        run: |
          python -m imagent_bench.runner \
            --config configs/pr-gate.yaml \
            --agent ../head/agents/openrouter_baseline \
            --output ../results/pr

      - name: Compare candidate against baseline
        if: steps.changes.outputs.enforce_improvement == 'true'
        working-directory: base
        run: |
          python -m imagent_bench.compare \
            --config configs/pr-gate.yaml \
            --baseline ../results/base/results.json \
            --candidate ../results/pr/results.json \
            --output ../results/comparison.json

      - name: Skip improvement gate for non-agent changes
        if: steps.changes.outputs.enforce_improvement != 'true'
        run: |
          {
            echo "# Benchmark Comparison"
            echo
            echo "The benchmark ran for this PR, but the improvement gate was not enforced because no OpenRouter baseline agent files changed."
          } > results/comparison.md

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-pr-${{ github.event.pull_request.number }}
          path: results/
          retention-days: 30
