name: Benchmark Verdict

# Runs after "Benchmark PR" completes and posts the pass/regression verdict back to
# the pull request as a comment and a label. It never runs PR code and takes no
# destructive action (no auto-merge, no auto-close) — maintainers act on the label.

on:
  workflow_run:
    workflows: ["Benchmark PR"]
    types: [completed]

permissions:
  contents: read
  actions: read
  pull-requests: write
  issues: write

jobs:
  verdict:
    runs-on: ubuntu-latest
    steps:
      - name: Post benchmark verdict
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            if (!["success", "failure"].includes(run.conclusion)) {
              core.info(`Ignoring run with conclusion "${run.conclusion}".`);
              return;
            }

            // The benchmark job uploads an artifact named benchmark-pr-<PR number>,
            // which resolves the PR reliably even for fork pull requests.
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run.id,
            });
            const artifact = artifacts.data.artifacts.find((a) => a.name.startsWith("benchmark-pr-"));
            if (!artifact) {
              core.info("No benchmark-pr artifact found; nothing to do.");
              return;
            }
            const prNumber = parseInt(artifact.name.replace("benchmark-pr-", ""), 10);
            if (!Number.isInteger(prNumber)) {
              core.info(`Could not parse a PR number from artifact "${artifact.name}".`);
              return;
            }
            const verdictKey = artifact.name.replace(/^benchmark-pr-\d+-/, "");
            if (!["gated-pass", "gated-fail", "not-enforced"].includes(verdictKey)) {
              core.info(`Artifact "${artifact.name}" does not encode a supported verdict.`);
              return;
            }

            // Bind the artifact-derived PR number to this run's head SHA. Without this,
            // a fork PR could upload a crafted artifact name to spoof a verdict onto a
            // different pull request. A mismatch also means the run is stale (the PR was
            // updated since), so skip it and let the newer run post the verdict.
            let pr;
            try {
              pr = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });
            } catch (error) {
              core.info(`PR #${prNumber} not found; skipping.`);
              return;
            }
            if (pr.data.head.sha !== run.head_sha) {
              core.info(`PR #${prNumber} head does not match run head ${run.head_sha}; skipping.`);
              return;
            }

            const common = { owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber };

            for (const label of ["benchmark-passed", "benchmark-regression"]) {
              try {
                await github.rest.issues.removeLabel({ ...common, name: label });
              } catch (error) {
                core.info(`Label "${label}" not present; skipping removal.`);
              }
            }

            let body;
            if (verdictKey === "gated-pass") {
              await github.rest.issues.addLabels({ ...common, labels: ["benchmark-passed"] });
              body = `✅ **Benchmark passed.** This pull request meets the gate in \`configs/pr-gate.yaml\` and is eligible to merge. [Run details](${run.html_url}).`;
            } else if (verdictKey === "gated-fail") {
              await github.rest.issues.addLabels({ ...common, labels: ["benchmark-regression"] });
              body = `❌ **Benchmark regression.** This pull request did not pass the gate in \`configs/pr-gate.yaml\`. Review the [run details](${run.html_url}) and push a fix, or a maintainer will close it.`;
            } else {
              body = `ℹ️ **Benchmark ran without an enforced gate.** No files under \`agents/openrouter_baseline/\` changed, so the benchmark ran for visibility only. [Run details](${run.html_url}).`;
            }
            await github.rest.issues.createComment({ ...common, body });
