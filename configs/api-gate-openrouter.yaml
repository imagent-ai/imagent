suite:
  id: ia_bench_v1
  tasks: [plan, reason, search, memory, feedback]
  max_cases: 6

runtime:
  seeds: [1001]
  deterministic: false
  timeout_seconds_per_case: 420
  max_feedback_rounds: 2

agent:
  qwen_image:
    mode: live
    provider: dashscope
    model: qwen-image-2.0-pro
    api_key_env: DASHSCOPE_API_KEY
    workspace_id_env: DASHSCOPE_WORKSPACE_ID
    endpoint_env: DASHSCOPE_ENDPOINT
    region: ap-southeast-1
    size: 2048*2048
    n: 1
    prompt_extend: true
    watermark: false
    timeout_seconds: 300
    download_timeout_seconds: 120

evaluation:
  image_judge:
    provider: openrouter
    model: openai/gpt-4o
    api_key_env: OPENROUTER_API_KEY
    endpoint: https://openrouter.ai/api/v1/chat/completions
    detail: high
    reasoning_effort: low
    max_output_tokens: 800
    timeout_seconds: 120
    fail_closed: true

metrics:
  primary: ia_score
  ia_weights:
    plan: 0.25
    reason: 0.25
    search: 0.25
    memory: 0.15
    feedback: 0.10

acceptance:
  require_schema_valid: true
  require_all_cases_completed: true
  rules:
    - metric: ia_score
      mode: higher_is_better
      min_absolute: 0.45
      min_delta_vs_baseline: 0.01
    - metric: pass_rate
      mode: higher_is_better
      max_regression_vs_baseline: 0.01
    - metric: checklist_accuracy
      mode: higher_is_better
      max_regression_vs_baseline: 0.01
    - metric: context_gap_score
      mode: higher_is_better
      max_regression_vs_baseline: 0.01
    - metric: latency_ms
      mode: lower_is_better
      max_absolute: 420000
